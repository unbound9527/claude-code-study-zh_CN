<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code 中文教程</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/black.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body { font-family: "Microsoft YaHei", system-ui; }
        .reveal { height: 100vh; }
        .reveal .slides { text-align: center; }
        .reveal h1 { color: #a78bfa; font-size: 2em; }
        .reveal p { font-size: 0.8em; }
        .subtitle { color: #c4b5fd; font-size: 1.2em; }
        .chapters {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 800px;
            margin: 30px auto;
        }
        .chapter-card {
            background: rgba(139, 92, 246, 0.15);
            border: 2px solid #a78bfa;
            border-radius: 16px;
            padding: 25px;
            text-align: left;
            transition: all 0.3s;
            cursor: pointer;
        }
        .chapter-card:hover {
            background: rgba(139, 92, 246, 0.25);
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.4);
        }
        .chapter-card h2 {
            color: #a78bfa;
            margin: 0 0 8px 0;
            font-size: 1.3em;
        }
        .chapter-card .desc {
            color: #e9d5ff;
            margin: 0;
            font-size: 0.85em;
        }
        .chapter-card .count {
            color: #94a3b8;
            font-size: 0.75em;
            margin-top: 8px;
        }
        .chapter-card a {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #64748b;
            font-size: 0.7em;
        }
    </style>
</head>

<body>

    <div class="reveal">
        <div class="slides">

            <section>
                <h1>Claude Code 中文教程</h1>
                <p class="subtitle">从零到高手 · 系统学习路径</p>

                <div class="chapters">
                    <div class="chapter-card">
                        <a href="L1.html">
                            <h2><i class="fas fa-rocket"></i> L1 掌握用法</h2>
                            <p class="desc">安装 · 表达 · 工具 · Git · Skills · MCP</p>
                            <p class="count">6 章节</p>
                        </a>
                    </div>
                    <div class="chapter-card">
                        <a href="L2.html">
                            <h2><i class="fas fa-bolt"></i> L2 熟练运用</h2>
                            <p class="desc">任务分解 · CLAUDE.md · 上下文 · 权限</p>
                            <p class="count">9 章节</p>
                        </a>
                    </div>
                    <div class="chapter-card">
                        <a href="L3.html">
                            <h2><i class="fas fa-code"></i> L3 技术视角</h2>
                            <p class="desc">架构 · Tools · Subagent · MCP · 记忆</p>
                            <p class="count">13 章节</p>
                        </a>
                    </div>
                    <div class="chapter-card">
                        <a href="L4.html">
                            <h2><i class="fas fa-shield-halved"></i> L4 实践经验</h2>
                            <p class="desc">安全 · Git · 团队 · 省钱 · 工作流 · TDD</p>
                            <p class="count">6 章节</p>
                        </a>
                    </div>
                </div>

                <p class="footer">共 34 章节 · 点击卡片开始学习</p>
            </section>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.min.js"></script>
    <script>
        Reveal.initialize({
            hash: true,
            transition: "slide",
            width: "100%",
            height: "100%",
            margin: 0.1
        });
    </script>
</body>

</html>
